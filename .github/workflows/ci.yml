name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Maven build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test
        run: mvn --batch-mode --update-snapshots -Dfmt.skip clean package

      - name: Upload plugin jar
        uses: actions/upload-artifact@v7
        with:
          name: ai-code-review-plugin
          path: target/ai-code-review-*.jar
          if-no-files-found: error
